name: CI - Markdown & Spell Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Markdown lint (non-blocking)
        run: npm run lint:md || true

      - name: Run Spell check (non-blocking)
        run: npm run spell || true
