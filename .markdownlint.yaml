# .markdownlint.yaml
default: true

# Relaxed rules for learning repo
MD013: false   # line length
MD033: false   # inline HTML
MD041: false   # first line heading (many docs don’t start with H1)
MD009: false        # trailing spaces
MD026: false        # trailing punctuation in headings

# Ignore generated / external content
ignore:
  - node_modules/**
  - .git/**
  - build/**


